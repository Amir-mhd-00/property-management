spring.application.name=property-management

server.port=8080

# JPA common settings
spring.jpa.properties.hibernate.format_sql=true

# Jackson JSON settings
spring.jackson.serialization.fail-on-empty-beans=false

# Profile (change this depending on environment)
spring.profiles.active=dev

server.error.include-message=always

# rate limiting
rate-limit.login.capacity=5
rate-limit.login.refill-tokens=5
rate-limit.login.refill-duration=1m

rate-limit.register.capacity=3
rate-limit.register.refill-tokens=3
rate-limit.register.refill-duration=1h

rate-limit.search.capacity=100
rate-limit.search.refill-tokens=100
rate-limit.search.refill-duration=1m

rate-limit.default-policy.capacity=300
rate-limit.default-policy.refill-tokens=300
rate-limit.default-policy.refill-duration=1m